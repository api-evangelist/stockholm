---
aid: stockholm
name: Stockholm University
description: >-
  Stockholm University (Stockholms universitet) is a public research university in
  Sweden, ranked #128 in the QS World University Rankings 2025. Like most Nordic
  public universities, it does not operate a single consolidated developer portal;
  its public, machine-readable footprint is distributed across standards-based and
  third-party services. Confirmed interfaces include the DiVA institutional
  repository OAI-PMH metadata endpoint, the Figshare-hosted research data repository
  (su.figshare.com) backed by the Figshare public REST API, and the public
  GitHub organization (stockholmuniversity) where IT operations and infrastructure
  tooling is maintained. Identity is federated through SWAMID/Shibboleth (SAML2),
  reflected in the org's shib-keygen-api project. No general-purpose open course or
  student-information API was found publicly documented.
