openapi: 3.0.3
info:
  title: Figshare altmetric profiles API
  description: Figshare API v2 - Full REST API documentation for managing articles, collections, projects and more.
  version: '2.0'
  contact:
    name: Figshare Support
    url: https://support.figshare.com/support/home
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
servers:
- url: https://api.figshare.com/v2
tags:
- name: profiles
paths:
  /account/profile:
    put:
      tags:
      - profiles
      summary: Update public profile
      description: Updates the fields of the user's public profile.
      operationId: update_user_profile
      parameters:
      - name: user_id
        in: query
        description: User ID
        schema:
          minimum: 1
          type: integer
      - name: institution_user_id
        in: query
        description: Institutional user ID
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfileUpdateData'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                example:
                  code: 200
                  message: OK
        '400':
          description: Bad Request
          content: {}
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '404':
          description: Not Found
          content: {}
        '500':
          description: Internal Server Error
          content: {}
      security:
      - OAuth2:
        - all
      x-codegen-request-body-name: User profile data
  /account/profile/{user_id}/picture:
    post:
      tags:
      - profiles
      summary: Update public profile picture
      description: Updates the profile picture of the user's public profile.
      operationId: update_user_profile_picture
      parameters:
      - name: user_id
        in: path
        description: User ID
        required: true
        schema:
          minimum: 1
          type: integer
      requestBody:
        content:
          multipart/form-data:
            schema:
              required:
              - profile_picture
              type: object
              properties:
                profile_picture:
                  type: string
                  description: User profile picture
                  format: binary
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                example:
                  code: 200
                  message: OK
        '400':
          description: Bad Request
          content: {}
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '404':
          description: Not Found
          content: {}
        '500':
          description: Internal Server Error
          content: {}
      security:
      - OAuth2:
        - all
components:
  schemas:
    ErrorMessage:
      type: object
      properties:
        code:
          type: integer
          description: A machine friendly error code, used by the dev team to identify the error.
        message:
          type: string
          description: A human friendly message explaining the error.
      x-tag: common
    ProfileUpdateData:
      type: object
      properties:
        first_name:
          type: string
          description: First name
          example: John
        last_name:
          type: string
          description: Last Name
          example: Doe
        orcid:
          type: string
          description: User ORCID
          example: 0000-0001-YYYY-XXXX
        job_title:
          type: string
          description: User job title
          example: Researcher at institution X
        fields_of_interest:
          type: array
          description: User fields of interest (category ids)
          example:
          - 1
          - 2
          items:
            type: integer
            description: Id of category
        fields_of_interest_by_source_id:
          type: array
          description: User fields of interest (category source IDs), supersedes the fields_of_interest property
          example:
          - '3204'
          - '320401'
          items:
            type: string
            description: Source ID of category
        location:
          type: string
          description: User location
          example: London, UK
        facebook:
          type: string
          description: User facebook URL
          format: url
          example: https://facebook.com/profile/1
        x:
          type: string
          description: User X (twitter) URL
          format: url
          example: https://x.com/profile/1
        linkedin:
          type: string
          description: User linkedin URL
          format: url
          example: https://linkedin.com/profile/2
        bio:
          type: string
          description: User biographical information
          example: Biographical information
        personal_profiles:
          type: array
          description: Add up to 10 additional personal profile links
          example:
          - label: ResearchGate
            url: https://researchgate.net/profile/1
          - label: ''
            url: https://academia.edu/profile/1
          items:
            type: object
            properties:
              label:
                type: string
                description: Label for the personal profile link
                example: ResearchGate
              url:
                type: string
                description: URL for the personal profile link
                format: url
                example: https://researchgate.net/profile/1
      x-tag: profiles
  securitySchemes:
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://figshare.com/account/applications/authorize
          tokenUrl: https://api.figshare.com/v2/token
          scopes:
            all: Grants all access
