components:
  schemas:
    CustomArticleField:
      required:
      - field_type
      - is_mandatory
      - name
      - order
      - settings
      - value
      type: object
      properties:
        name:
          type: string
          description: Custom  metadata name
          example: key
        value:
          type: object
          description: Custom metadata value (can be either a string or an array of strings)
          example: value
        field_type:
          type: string
          description: Custom field type
          example: textarea
          enum:
          - text
          - textarea
          - dropdown
          - url
          - email
          - date
          - dropdown_large_list
        settings:
          type: object
          properties: {}
          description: Settings for the custom field
          example:
            validations:
              min_length: 1
              max_length: 1000
            placeholder: Enter your custom field here
        order:
          type: integer
          description: Order of the custom field
          example: 1
        is_mandatory:
          type: boolean
          description: Whether the field is mandatory or not
          example: false
      x-tag: articles
    LocationWarningsUpdate:
      required:
      - location
      - warnings
      type: object
      properties:
        location:
          type: string
          description: Url for entity
          format: url
        warnings:
          type: array
          description: Issues encountered during the operation
          items:
            type: string
      x-tag: common
    CategoriesCreator:
      required:
      - categories
      type: object
      properties:
        categories:
          type: array
          description: List of category ids
          example:
          - 1
          - 10
          - 11
          items:
            type: integer
            description: Id of category
      x-tag: articles
    Resource:
      type: object
      properties:
        id:
          maxLength: 255
          type: string
          description: ID of resource item
          example: aaaa23512
          default: ''
        title:
          maxLength: 1000
          type: string
          description: Title of resource item
          example: Test title
          default: ''
        doi:
          type: string
          description: DOI of resource item
          default: ''
        link:
          maxLength: 255
          type: string
          description: Link of resource item
          example: https://docs.figshare.com
          default: ''
        status:
          maxLength: 100
          type: string
          description: Status of resource item
          example: frozen
          default: ''
        version:
          type: integer
          description: Version of resource item
          example: 1
          default: 0
      x-tag: resource
    CollectionVersions:
      required:
      - funding
      - url
      - version
      type: object
      properties:
        version:
          type: integer
          description: Version number
          example: 1
        url:
          type: string
          description: Api endpoint for the collection version
          format: url
          example: https://api.figshare.com/v2/collections/2000005/versions/1
        funding:
          type: array
          description: Full Collection funding information
          items:
            $ref: '#/components/schemas/FundingInformation'
      x-tag: collections
    Collection:
      required:
      - doi
      - handle
      - id
      - timeline
      - title
      - url
      type: object
      properties:
        id:
          type: integer
          description: Collection id
          example: 123
        title:
          type: string
          description: Collection title
          example: Sample collection
        doi:
          type: string
          description: Collection DOI
          example: 10.6084/m9.figshare.123
        handle:
          type: string
          description: Collection Handle
          example: 111184/figshare.1234
        url:
          type: string
          description: Api endpoint
          example: https://api.figshare.com/v2/collections/123
        timeline:
          $ref: '#/components/schemas/Timeline'
      x-tag: collections
    CollectionHandle:
      required:
      - handle
      type: object
      properties:
        handle:
          type: string
          description: Reserved Handle
          example: 11172/FK2.FIGSHARE.20345
      x-tag: collections
    FundingCreate:
      type: object
      properties:
