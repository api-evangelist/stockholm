          content: {}
        '500':
          description: Internal Server Error
          content: {}
      security:
      - OAuth2:
        - all
      x-subcategory: Private Project Notes
    post:
      tags:
      - projects
      summary: Create project note
      description: Create a new project note
      operationId: private_project_notes_create
      parameters:
      - name: project_id
        in: path
        description: Project unique identifier
        required: true
        schema:
          minimum: 1
          type: integer
      requestBody:
        description: Note message
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectNoteCreate'
        required: true
      responses:
        '201':
          description: Created
          headers:
            Location:
              description: Location note
              schema:
                type: string
                format: url
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Location'
        '400':
          description: Bad Request
          content: {}
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '404':
          description: Not Found
          content: {}
        '500':
          description: Internal Server Error
          content: {}
      security:
      - OAuth2:
        - all
      x-subcategory: Private Project Notes
      x-codegen-request-body-name: Note
  /account/projects/{project_id}/notes/{note_id}:
