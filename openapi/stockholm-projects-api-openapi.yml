      - role_name
      - status
      - user_id
      type: object
      properties:
        status:
          type: string
          description: Status of collaborator invitation
          example: invited
        role_name:
          type: string
          description: Collaborator role
          example: Owner
        user_id:
          type: integer
          description: Collaborator id
          example: 1
        name:
          type: string
          description: Collaborator name
          example: name
      x-tag: projects
    ArticleComplete:
      required:
      - authors
      - custom_fields
      - download_disabled
      - embargo_options
      - figshare_url
      - files
      - folder_structure
      properties:
        figshare_url:
          type: string
          description: Article public url
          format: url
          example: http://figshare.com/articles/media/article_name/2000005
        download_disabled:
          type: boolean
          description: If true, downloading of files for this article is disabled
          example: false
        files:
          type: array
          description: List of up to 10 article files.
          items:
            $ref: '#/components/schemas/PublicFile'
        folder_structure:
          type: object
          properties: {}
          description: Mapping of file ids to folder paths, if folders are used
          example:
            '3000002': Test Folder
        authors:
          type: array
          description: List of article authors
          items:
            $ref: '#/components/schemas/Author'
        custom_fields:
          type: array
          description: List of custom fields values
          items:
            $ref: '#/components/schemas/CustomArticleField'
        embargo_options:
          type: array
          description: List of embargo options
          items:
            $ref: '#/components/schemas/GroupEmbargoOptions'
      allOf:
      - $ref: '#/components/schemas/ProjectArticle'
      x-tag: articles
    ProjectPrivate:
      required:
      - role
      - storage
      properties:
        role:
          type: string
          description: Role inside this project
          example: Owner
          enum:
          - Owner
          - Collaborator
          - Viewer
        storage:
          type: string
          description: Project storage type
          example: individual
          enum:
          - individual
          - group
      allOf:
      - $ref: '#/components/schemas/Project'
      x-tag: projects
    Project:
      required:
      - created_date
      - id
      - modified_date
      - title
      - url
      type: object
      properties:
        url:
          type: string
          description: Api endpoint
          example: http://api.figshare.com/v2/account/projects/1
        id:
          type: integer
          description: Project id
          example: 1
        title:
          type: string
          description: Project title
          example: project
        created_date:
          type: string
          description: Date when project was created
          example: '2017-05-16T14:52:54Z'
        modified_date:
          type: string
          description: Date when project was last modified
          example: '2017-05-16T14:52:54Z'
      x-tag: projects
    Location:
      required:
      - location
      type: object
      properties:
        location:
          type: string
          description: Url for item
          format: url
      x-tag: common
    Article:
      required:
      - created_date
      - defined_type
      - defined_type_name
      - doi
      - handle
      - id
      - resource_doi
      - resource_title
      - thumb
      - timeline
      - title
      - url
      - url_private_api
      - url_private_html
      - url_public_api
      - url_public_html
      type: object
      properties:
        id:
          type: integer
          description: Unique identifier for article
          example: 1434614
        title:
          type: string
          description: Title of article
          example: Test article title
        doi:
          type: string
          description: DOI
          example: 10.6084/m9.figshare.1434614
        handle:
          type: string
          description: Handle
          example: 111184/figshare.1234
        url:
          type: string
          description: Api endpoint for article
          format: url
          example: http://api.figshare.com/articles/1434614
        url_public_html:
          type: string
          description: Public site endpoint for article
          format: url
          example: https://figshare.com/articles/media/Test_article_title/1434614
        url_public_api:
          type: string
          description: Public Api endpoint for article
          format: url
          example: https://api.figshare.com/articles/1434614
        url_private_html:
          type: string
          description: Private site endpoint for article
          format: url
          example: https://figshare.com/account/articles/1434614
        url_private_api:
          type: string
          description: Private Api endpoint for article
          format: url
          example: https://api.figshare.com/account/articles/1434614
        timeline:
          $ref: '#/components/schemas/Timeline'
        thumb:
          type: string
          description: Thumbnail image
          format: url
          example: https://ndownloader.figshare.com/files/123456789/preview/12345678/thumb.png
        defined_type:
          type: integer
          description: Type of article identifier
          example: 3
        defined_type_name:
          type: string
          description: Name of the article type identifier
          example: media
        resource_doi:
          type: string
          description: Deprecated by related materials. Not applicable to regular users. In a publisher case, this is the publisher article DOI.
          default: ''
        resource_title:
          type: string
          description: Deprecated by related materials. Not applicable to regular users. In a publisher case, this is the publisher article title.
          default: ''
        created_date:
          type: string
          description: Date when article was created
          example: '2017-05-18T11:49:03Z'
      x-tag: articles
    CommonSearch:
      type: object
      properties:
        search_for:
          type: string
          description: Search term
          example: figshare
        page:
          maximum: 5000
          minimum: 1
          type: integer
          description: Page number. Used for pagination with page_size
          example: 1
        page_size:
          maximum: 1000
          minimum: 1
          type: integer
          description: The number of results included on a page. Used for pagination with page
          example: 10
          default: 10
        limit:
          maximum: 1000
          minimum: 1
          type: integer
          description: Number of results included on a page. Used for pagination with query
          example: 10
        offset:
          maximum: 5000
          minimum: 0
          type: integer
          description: Where to start the listing (the offset of the first result). Used for pagination with limit
          example: 0
        order_direction:
          type: string
          description: Direction of ordering
          example: desc
          default: desc
          enum:
          - asc
          - desc
        institution:
          type: integer
          description: only return collections from this institution
          example: 2000013
        published_since:
          type: string
          description: Filter by article publishing date. Will only return articles published after the date. date(ISO 8601) YYYY-MM-DD or date-time(ISO 8601) YYYY-MM-DDTHH:mm:ssZ
          example: '2017-12-22'
        modified_since:
          type: string
          description: Filter by article modified date. Will only return articles modified after the date. date(ISO 8601) YYYY-MM-DD or date-time(ISO 8601) YYYY-MM-DDTHH:mm:ssZ
          example: '2017-12-22'
        group:
          type: integer
          description: only return collections from this group
          example: 2000013
      x-tag: common
    FundingInformation:
      required:
      - funder_name
      - grant_code
      - id
      - is_user_defined
      - title
      - url
      type: object
      properties:
        id:
          type: integer
          description: Funding id
          example: 1
        title:
          type: string
          description: The funding name
          example: Scholarly funding
        grant_code:
          type: string
          description: The grant code
        funder_name:
          type: string
          description: Funder's name
        is_user_defined:
          type: integer
          description: Return 1 whether the grant has been introduced manually, 0 otherwise
        url:
          type: string
          description: The grant url
          format: url
          example: https://app.dimensions.ai/details/grant/1
      x-tag: funding
    ProjectNotePrivate:
      required:
      - text
      properties:
        text:
          type: string
          description: Full text of note
          example: text
      allOf:
      - $ref: '#/components/schemas/ProjectNote'
      x-tag: projects
    ProjectCollaboratorInvite:
      required:
      - role_name
      type: object
      properties:
        role_name:
          type: string
          description: Role of the the collaborator inside the project
          example: viewer
          enum:
          - viewer
          - collaborator
        user_id:
          type: integer
          description: User id of the collaborator
          example: 100008
        email:
          type: string
          description: Collaborator email
          example: user@domain.com
        comment:
          type: string
          description: Text sent when inviting the user to the project
          example: hey
      x-tag: projects
    PrivateFile:
      required:
      - is_attached_to_public_version
      - preview_state
      - upload_token
      - upload_url
      - viewer_type
      properties:
        viewer_type:
          type: string
          description: File viewer type
        preview_state:
          type: string
          description: File preview state
          example: preview not available
        upload_url:
          type: string
          description: Upload url for file
          format: url
          example: https://uploads.figshare.com
        upload_token:
          type: string
          description: Token for file upload
          example: 9dfc5fe3-d617-4d93-ac11-8afe7e984a4b
        is_attached_to_public_version:
          type: boolean
          description: True if the file is attached to a public item version
          example: true
      allOf:
      - $ref: '#/components/schemas/PublicFile'
      x-tag: common
    ResponseMessage:
      required:
      - message
      type: object
      properties:
        message:
          type: string
          description: Response message text
          example: Project 1 has been published
      x-tag: common
    Collaborator:
      required:
      - name
      - role_name
      - user_id
      type: object
      properties:
        role_name:
          type: string
          description: Collaborator role
          example: Owner
        user_id:
          type: integer
          description: Collaborator id
          example: 1
        name:
          type: string
          description: Collaborator name
          example: name
      x-tag: projects
    PublicFile:
      required:
      - computed_md5
      - download_url
      - id
      - is_link_only
      - name
      - size
      - supplied_md5
      type: object
      properties:
        id:
          type: integer
          description: File id
          example: 3000002
        name:
          type: string
          description: File name
          example: test.xls
        size:
          type: integer
          description: File size
          example: 14848
        is_link_only:
          type: boolean
          description: True if file is hosted somewhere else
          example: false
        download_url:
          type: string
          description: Url for file download
          format: url
          example: https://ndownloader.figshare.com/files/3000002
        supplied_md5:
          type: string
          description: File supplied md5
          example: 043a51806d646e88cafbf19e7b82846f
        computed_md5:
          type: string
          description: File computed md5
          example: 043a51806d646e88cafbf19e7b82846f
        mimetype:
          type: string
          description: MIME Type of the file, it defaults to an empty string
          example: application/pdf
      x-tag: common
    TimelineUpdate:
      type: object
      properties:
        firstOnline:
          type: string
          description: Online posted date
          example: '2015-12-31'
        publisherPublication:
          type: string
          description: Publish date
          example: '2015-12-31'
        publisherAcceptance:
          type: string
          description: Date when the item was accepted for publication
          example: '2015-12-31'
      x-tag: timeline_update
    ProjectsSearch:
      properties:
        order:
          type: string
          description: The field by which to order.
          example: published_date
          default: published_date
          enum:
          - published_date
          - modified_date
          - views
      allOf:
      - $ref: '#/components/schemas/CommonSearch'
      x-tag: projects
    ErrorMessage:
      type: object
      properties:
        code:
          type: integer
          description: A machine friendly error code, used by the dev team to identify the error.
        message:
          type: string
          description: A human friendly message explaining the error.
      x-tag: common
    License:
      required:
      - name
      - url
      - value
      type: object
      properties:
        value:
          type: integer
          description: License value
          example: 1
        name:
          type: string
          description: License name
          example: CC BY
        url:
          type: string
          description: License url
          format: url
          example: http://creativecommons.org/licenses/by/4.0/
      x-tag: institutions
    ProjectComplete:
      required:
      - collaborators
      - created_date
      - custom_fields
      - description
      - funding
      - funding_list
      - modified_date
      properties:
        funding:
          type: string
          description: Project funding
          example: ''
        funding_list:
          type: array
          description: Full Project funding information
          items:
            $ref: '#/components/schemas/FundingInformation'
        description:
          type: string
          description: Project description
          example: description
        collaborators:
          type: array
          description: List of project collaborators
          items:
            $ref: '#/components/schemas/Collaborator'
        custom_fields:
          type: array
          description: Project custom fields
          items:
            $ref: '#/components/schemas/CustomArticleField'
        modified_date:
          type: string
          description: Date when project was last modified
          example: '2017-05-16T14:52:54Z'
        created_date:
          type: string
          description: Date when project was created
          example: '2017-05-16T14:52:54Z'
      allOf:
      - $ref: '#/components/schemas/Project'
      x-tag: projects
    ProjectNoteCreate:
      required:
      - text
      type: object
      properties:
        text:
          minLength: 3
          type: string
          description: Text of the note
          example: note to remember
      x-tag: projects
    GroupEmbargoOptions:
      required:
      - id
      - ip_name
      - type
      type: object
      properties:
        id:
          type: integer
          description: Embargo option id
          example: 364
        type:
          type: string
          description: Embargo permission type
          example: ip_range
          enum:
          - logged_in
          - ip_range
          - administrator
        ip_name:
          type: string
          description: IP range name; value appears if type is ip_range
          example: Figshare IP range
      x-tag: institutions
  securitySchemes:
    OAuth2:
      type: oauth2
