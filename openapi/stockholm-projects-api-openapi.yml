        in: path
        description: Project unique identifier
        required: true
        schema:
          minimum: 1
          type: integer
      requestBody:
        description: viewer or collaborator role. User user_id or email of user
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectCollaboratorInvite'
        required: true
      responses:
        '201':
          description: Created
          content:
            application/json:
