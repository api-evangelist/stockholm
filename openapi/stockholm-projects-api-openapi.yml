      tags:
      - projects
      summary: Project note details
      operationId: private_project_note
      parameters:
      - name: project_id
        in: path
        description: Project unique identifier
        required: true
        schema:
          minimum: 1
          type: integer
      - name: note_id
        in: path
        description: Note unique identifier
        required: true
