      summary: List project collaborators
      description: List Project collaborators and invited users
      operationId: private_project_collaborators_list
      parameters:
      - name: project_id
        in: path
        description: Project unique identifier
        required: true
        schema:
          minimum: 1
          type: integer
      responses:
