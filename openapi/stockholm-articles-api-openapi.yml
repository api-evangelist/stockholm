          - 11
          items:
            type: integer
            description: Id of category
      x-tag: articles
    Resource:
      type: object
      properties:
        id:
          maxLength: 255
          type: string
          description: ID of resource item
          example: aaaa23512
          default: ''
        title:
          maxLength: 1000
          type: string
          description: Title of resource item
          example: Test title
          default: ''
        doi:
          type: string
          description: DOI of resource item
          default: ''
        link:
          maxLength: 255
          type: string
          description: Link of resource item
          example: https://docs.figshare.com
          default: ''
        status:
          maxLength: 100
          type: string
          description: Status of resource item
          example: frozen
          default: ''
        version:
          type: integer
          description: Version of resource item
          example: 1
          default: 0
      x-tag: resource
    ArticleWithProject:
